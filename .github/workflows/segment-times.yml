name: Segment Times

on:
  workflow_dispatch:  # Manual trigger only — no cron schedule

permissions:
  issues: write  # to create segment-times issues

jobs:
  compute:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compute segment times and post issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python segment_times.py
